name: Environment Variable Example

on:
  workflow_dispatch:

jobs:
  test-environment:
    runs-on: ubuntu-latest

    env:
      MY_ENV_VAR: "Hello Asma"

    steps:
      - name: Print Environment Variable
        run: echo $MY_ENV_VAR

      - name: Check Current User
        run: whoami

      - name: Check Current Directory
        run: pwd

      - name: List Files
        run: ls -la

      - name: Check Date
        run: date
